name: Bug report
description: Report a defect in a showfase package.
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in every
        required field — issues missing a minimal reproduction may be
        closed as not actionable.

  - type: checkboxes
    id: search
    attributes:
      label: I searched existing issues
      description: Please confirm you have searched open and closed issues.
      options:
        - label: I searched the issue tracker and this is not a duplicate.
          required: true

  - type: checkboxes
    id: package
    attributes:
      label: Which package(s) is affected?
      description: Tick every package where the bug reproduces.
      options:
        - label: "`showfase` (runtime)"
        - label: "`showfase_generator` (build_runner)"
        - label: "`showfase_annotation`"
        - label: "example app"
        - label: Other / unsure

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen instead?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The exact steps required to trigger the bug.
      placeholder: |
        1. Add `@Preview(...)` on a top-level function returning `Widget`.
        2. Run `dart run build_runner build`.
        3. Observe error / unexpected output.
    validations:
      required: true

  - type: textarea
    id: preview_source
    attributes:
      label: Minimal `@Preview` usage
      description: Paste the smallest annotated declaration that triggers the bug.
      render: dart
      placeholder: |
        import 'package:flutter/widget_previews.dart';
        import 'package:flutter/widgets.dart';

        @Preview(name: 'Repro')
        Widget myPreview() => const SizedBox();
    validations:
      required: true

  - type: textarea
    id: generated_output
    attributes:
      label: Generated output
      description: Paste the offending snippet from `showfase.g.dart`, or note "did not generate" if the build failed. Only relevant for `showfase_generator` bugs.
      render: dart

  - type: input
    id: dart_version
    attributes:
      label: Dart version
      description: Output of `dart --version`.
      placeholder: 'Dart SDK version: 3.11.4 (stable) (…) on "macos_arm64"'
    validations:
      required: true

  - type: input
    id: flutter_version
    attributes:
      label: Flutter version
      description: First line of `flutter --version`.
      placeholder: "Flutter 3.41.6 • channel stable • …"
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: "`flutter doctor -v` output"
      description: Required when the bug involves rendered widgets or platform integration; optional for pure-Dart generator bugs.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Logs / `build_runner` output
      description: Any error message, stack trace, or `build_runner` output relevant to the bug.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or video
      description: If the bug affects rendered widgets, attach a screenshot or a short screen recording. Skip for generator bugs.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant (workarounds tried, related issues, etc.).
