name: Documentation
description: Report missing, unclear, or incorrect documentation.
title: "docs: "
labels: [documentation, needs-triage]
body:
  - type: textarea
    id: description
    attributes:
      label: What is missing, unclear, or incorrect?
      description: Describe the documentation gap. Include the file path or URL of the affected section if known.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you have a suggestion for the fix or addition, share it here.
