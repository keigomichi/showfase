name: showfase_generator
description: build_runner code generator that collects Flutter @Preview widgets into a committable showfase.g.dart catalog.
version: 0.1.0
repository: https://github.com/keigomichi/showfase
issue_tracker: https://github.com/keigomichi/showfase/issues
topics:
  - preview
  - build-runner
  - source-gen
  - ui-catalog

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  analyzer: 10.0.1
  build: 4.0.6
  code_builder: 4.11.1
  collection: 1.19.1
  dart_style: 3.1.7
  glob: 2.1.3
  meta: 1.17.0
  path: 1.9.1
  pub_semver: 2.2.0
  source_gen: 4.2.3
  showfase_annotation: 0.1.0

dev_dependencies:
  build_runner: 2.15.0
  build_test: 3.5.15
  lints: 6.1.0
  logging: 1.3.0
  test: 1.30.0
