name: showfase

packages:
  - packages/*
  - examples/*

command:
  bootstrap:
    # Rely on native pub workspace resolution; disable the legacy pubspec-overrides mode.
    hooks:
      pre: dart pub get
  version:
    workspaceChangelog: true

scripts:
  analyze:
    description: Run static analysis across all packages.
    exec: dart analyze
  test:
    description: Run all tests.
    exec: dart test
    packageFilters:
      dirExists: test
  test:flutter:
    description: Run Flutter widget tests.
    exec: flutter test
    packageFilters:
      dependsOn: flutter
      dirExists: test
  format:
    description: Format all Dart files.
    exec: dart format .
  build:
    description: Run build_runner in the example app.
    run: dart run build_runner build --delete-conflicting-outputs
    exec:
      concurrency: 1
    packageFilters:
      dependsOn: build_runner
  build:verify:
    description: Verify generated files are up-to-date.
    run: |
      dart run build_runner build --delete-conflicting-outputs
      git diff --exit-code -- '*.g.dart'
    exec:
      concurrency: 1
    packageFilters:
      dependsOn: build_runner
